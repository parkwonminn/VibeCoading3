<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>환영합니다</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <nav class="nav">
            <span class="logo">My Site</span>
            <ul class="nav-list">
                <li><a href="#intro">소개</a></li>
                <li><a href="#features">기능</a></li>
                <li><a href="#contact">연락처</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="intro" class="hero">
            <h1 class="hero-title">환영합니다</h1>
            <p class="hero-description">간단하고 아름다운 웹사이트에 오신 것을 환영합니다.</p>
            <button id="greetingButton" class="cta-button">인사하기</button>
        </section>

        <section id="features" class="features">
            <h2 class="section-title">주요 기능</h2>
            <div class="feature-grid">
                <article class="feature-card">
                    <span class="feature-icon">✦</span>
                    <h3>심플함</h3>
                    <p>불필요한 요소 없이 깔끔한 디자인</p>
                </article>
                <article class="feature-card">
                    <span class="feature-icon">✦</span>
                    <h3>반응형</h3>
                    <p>모든 기기에서 최적의 화면 제공</p>
                </article>
                <article class="feature-card">
                    <span class="feature-icon">✦</span>
                    <h3>인터랙티브</h3>
                    <p>클릭과 호버로 생동감 있는 경험</p>
                </article>
            </div>
        </section>

        <section id="contact" class="contact">
            <h2 class="section-title">오늘의 시간</h2>
            <p id="currentTime" class="time-display"></p>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2025 간단한 웹사이트. 모든 권리 보유.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
